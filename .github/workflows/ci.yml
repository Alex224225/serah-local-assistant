name: CI

on:
  push:
    branches: [public-repo-improvement, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Install and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

    # SAFETY NOTES:
    # - This workflow uses NO secrets.
    # - It makes NO network requests to market data providers, brokerages, or order systems.
    # - All test fixtures are synthetic local files in the tests/ and examples/ directories.
    # - The serah-demo package has zero runtime dependencies beyond the Python standard library.
